app = "sneaker-drop-worker"
primary_region = "iad"

[build]
  dockerfile = "apps/socket-worker/Dockerfile"

[env]
  PORT = "3002"
  EXPIRY_INTERVAL_MS = "2000"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
